[General]
# Remplacé par la variable d'environnement CLIENT_PATH si définie
client_location=/home/container/client

[Database]
# Ces valeurs sont remplacées par les variables d'environnement Pterodactyl :
# MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD
mysql_host=CHANGE_ME
mysql_port=3306
mysql_database=CHANGE_ME
mysql_username=CHANGE_ME
mysql_password=CHANGE_ME

[Networking]
# Remplacé par la variable d'environnement EXTERNAL_IP si définie
external_ip=0.0.0.0
auth_server_port=25896
chat_server_port=25784
world_server_port=25740
master_server_port=4000

[Logging]
log_to_console=1
log_level=2
